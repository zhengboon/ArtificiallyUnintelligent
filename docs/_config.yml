title: ArtificiallyUnintelligent
description: BrainHack 2026 RoboVerse Drone Challenge — University Finals, Marina Bay Sands, 10–11 June 2026.
theme: jekyll-theme-cayman

# Pretty URLs
permalink: pretty

# Markdown
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  toc_levels: 2..3

# Plugins (whitelisted on GitHub Pages)
plugins:
  - jekyll-relative-links
  - jekyll-seo-tag

relative_links:
  enabled: true
  collections: true

include:
  - CONCEPT_PLAN.md

exclude:
  - LINKEDIN_POST_DRAFT.md
  - images/README.md
  - vendor
  - Gemfile
  - Gemfile.lock

# SEO defaults
url: "https://zhengboon.github.io"
baseurl: "/ArtificiallyUnintelligent"
github:
  repository_url: https://github.com/zhengboon/ArtificiallyUnintelligent

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default
